<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>
        <div class="credentials-panel signin">
            <h2 class="slide-element">Login</h2>
            <form action="#" id="loginForm">
                <div class="field-wrapper slide-element">
                    <input type="text" required id="loginUsername">
                    <label for="">Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" required id="loginPassword">
                    <label for="">Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Login</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Don't have an account? <br> <a href="#" class="register-trigger">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">WELCOME BACK!</h2>
        </div>

        <div class="credentials-panel signup">
            <h2 class="slide-element">Register</h2>
            <form action="#" id="registerForm">
                <div class="field-wrapper slide-element">
                    <input type="text" required id="registerUsername">
                    <label for="">Username</label>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="email" required id="registerEmail">
                    <label for="">Email</label>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" required id="registerPassword">
                    <label for="">Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Register</button>
                </div>

                <div class="switch-link slide-element">
                    <p>Already have an account? <br> <a href="#" class="login-trigger">Sign In</a></p>
                </div>
            </form>
        </div>

        <div class="welcome-section signup">
            <h2 class="slide-element">WELCOME!</h2>
        </div>

    </div>
    <div class="footer"></div>

    <script src="style.js"></script>
    <script>
/* ---------------- LOGIN ---------------- */
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!username || !password) {
    alert('Please fill in all fields');
    return;
  }

  try {
    console.log('Sending login request...');
    const response = await fetch('http://localhost:3000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await response.json();
    console.log('Response status:', response.status);
    console.log('Response data:', data);
if (response.ok) {
    console.log("Login successful ✅");

    // ✅ Save login state
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('currentUser', username);

    // ✅ Redirect
    window.location.href = "dashboard.html";
}else {
      alert('Login failed: ' + (data.error || 'Unknown error'));
    }
  } catch (error) {
    alert('Server not reachable. Is backend running on port 3000?');
    console.error('Error:', error);
  }
});
/* ---------------- REGISTER ---------------- */
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('registerUsername').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;

    if (!name || !email || !password) {
        alert('Please fill in all fields');
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
    const data = await response.json();
    
    console.log("Logged user from backend:", data);

    const loggedUser =
        data.username ||
        data.name ||
        document.getElementById('loginUsername').value;

    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("currentUser", loggedUser);

    window.location.href = "dashboard.html";
}
    } catch (error) {
        alert('Server is reachable ✅ ');
        console.error(error);
    }
});
</script>
</body>
</html>
